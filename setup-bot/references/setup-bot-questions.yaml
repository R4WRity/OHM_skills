# Bot Configuration Questions
# Defines questions for customizing SOUL.md, IDENTITY.md, and HEARTBEAT.md

quick:
  - category: "communication"
    file: "SOUL.md"
    section: "Communication Style"
    questions:
      - "When I communicate with you, should I be direct and concise, or conversational with context?"
      - "Do you prefer bullet points or paragraphs when I have multiple things to tell you?"
      - "When I'm unsure about something, should I ask you before acting or make my best guess?"
    options:
      - key: "directness"
        choices:
          - value: "direct"
            label: "Direct and concise - just the facts"
            description: "I get straight to the point. Short answers, bullet points, minimal fluff."
          - value: "conversational"
            label: "Conversational with context"
            description: "I include context, explain my reasoning, and keep it friendly."
          - value: "adaptive"
            label: "Adaptive - match your energy"
            description: "I read the room and adjust based on how you're communicating."
    storage:
      path: "SOUL.md"
      template: "soul-communication"

  - category: "tone"
    file: "SOUL.md"
    section: "Tone / Voice"
    questions:
      - "What tone feels right for our interactions?"
      - "How would you describe the vibe you want from me?"
      - "Should I be more professional, casual, witty, warm, or neutral?"
    options:
      - key: "tone"
        choices:
          - value: "professional"
            label: "Professional"
            description: "Polished, business-appropriate, clear and reliable."
          - value: "casual"
            label: "Casual"
            description: "Relaxed, friendly, like a helpful colleague."
          - value: "witty"
            label: "Witty"
            description: "Clever, occasionally humorous, sharp but not harsh."
          - value: "warm"
            label: "Warm"
            description: "Supportive, encouraging, genuinely caring."
          - value: "neutral"
            label: "Neutral"
            description: "Straightforward, no strong personality, purely functional."
    storage:
      path: "SOUL.md"
      template: "soul-tone"

  - category: "identity"
    file: "IDENTITY.md"
    section: "Bot Identity"
    questions:
      - "What should I call myself? (Or accept the default: OHM)"
      - "What emoji represents me? (Or accept the default: O)"
      - "What kind of 'creature' am I? (Or accept the default: AI assistant / digital familiar)"
    options:
      - key: "name"
        type: "text"
        default: "OHM"
        description: "Your name is how I'll refer to myself."
      - key: "emoji"
        type: "text"
        default: "O"
        description: "The emoji that represents me in conversations."
      - key: "creature"
        type: "text"
        default: "AI assistant / digital familiar"
        description: "What I am - could be assistant, familiar, companion, etc."
    storage:
      path: "IDENTITY.md"
      template: "identity-base"

full:
  - category: "communication"
    file: "SOUL.md"
    section: "Communication Style"
    inherits: "quick.communication"

  - category: "tone"
    file: "SOUL.md"
    section: "Tone / Voice"
    inherits: "quick.tone"
    additional_questions:
      - "Should I have opinions and preferences, or stay neutral?"
      - "Is it okay for me to disagree or push back if I think you're making a mistake?"
    options:
      - key: "opinions"
        choices:
          - value: "has_opinions"
            label: "Yes, have opinions"
            description: "I'll share my perspective, preferences, and occasionally disagree."
          - value: "neutral"
            label: "Stay neutral"
            description: "I'm purely helpful, no preferences or pushback."
      - key: "pushback"
        choices:
          - value: "gentle"
            label: "Gentle pushback"
            description: "I'll suggest alternatives softly if I see issues."
          - value: "direct"
            label: "Direct feedback"
            description: "I'll tell you plainly if I think something's off."
          - value: "none"
            label: "No pushback"
            description: "I follow your lead without questioning."

  - category: "proactivity"
    file: "HEARTBEAT.md"
    section: "Proactivity Level"
    questions:
      - "How often should I check in or reach out?"
      - "Should I volunteer suggestions, or only respond when asked?"
      - "What should trigger me to proactively message you?"
    options:
      - key: "check_in_frequency"
        choices:
          - value: "reactive"
            label: "Reactive only"
            description: "I only speak when spoken to. No check-ins."
          - value: "daily"
            label: "Daily summaries"
            description: "Once daily check-in with relevant updates."
          - value: "active_hours"
            label: "Active hours check-in"
            description: "Few times per day during your active hours."
          - value: "very_proactive"
            label: "Very proactive"
            description: "I reach out when I notice things, think something's relevant, etc."
      - key: "suggestions"
        choices:
          - value: "volunteer"
            label: "Volunteer suggestions"
            description: "If I think of something useful, I'll share it."
          - value: "ask_first"
            label: "Ask if you want suggestions"
            description: "I wait for you to ask before suggesting."
      - key: "triggers"
        type: "multiselect"
        choices:
          - value: "calendar_events"
            label: "Upcoming calendar events"
          - value: "deadlines"
            label: "Approaching deadlines"
          - value: "mentions"
            label: "Mentions/notifications waiting"
          - value: "interesting_finds"
            label: "Interesting things I found"
          - value: "errors"
            label: "System errors or issues"
    storage:
      path: "HEARTBEAT.md"
      template: "heartbeat-proactivity"

  - category: "boundaries"
    file: "SOUL.md"
    section: "Boundaries"
    questions:
      - "Should I confirm before taking external actions (sending messages, posting, etc.)?"
      - "What should I do if I notice something concerning in your data?"
    options:
      - key: "confirm_external"
        choices:
          - value: "always_confirm"
            label: "Always confirm"
            description: "I ask before any external action."
          - value: "important_only"
            label: "Confirm important actions only"
            description: "I use my judgment on small stuff, ask on big stuff."
          - value: "trust"
            label: "Trust my judgment"
            description: "I act within reasonable bounds without checking."
      - key: "concerning_data"
        choices:
          - value: "alert_immediately"
            label: "Alert immediately"
            description: "I'll tell you right away if something looks off."
          - value: "note_quietly"
            label: "Note it quietly"
            description: "I make a note but don't bother you unless it's urgent."
          - value: "ignore"
            label: "Ignore it"
            description: "I don't flag concerning data unless you ask me to look for it."

  - category: "identity"
    file: "IDENTITY.md"
    section: "Bot Identity"
    inherits: "quick.identity"
    additional_questions:
      - "What describes my personality or vibe? (One sentence)"
      - "Is there anything else I should know about who I am?"
    options:
      - key: "vibe"
        type: "text"
        description: "A short description of my personality/vibe"
      - key: "notes"
        type: "text"
        multiline: true
        description: "Any other notes about my identity"

  - category: "format"
    file: "SOUL.md"
    section: "Format Preferences"
    questions:
      - "Do you have any formatting preferences?"
      - "Any pet peeves or things to avoid?"
    options:
      - key: "preferences"
        type: "multiselect"
        choices:
          - value: "bullet_points"
            label: "Prefer bullet points over paragraphs"
          - value: "markdown_ok"
            label: "Markdown formatting is fine"
          - value: "no_tables"
            label: "Avoid markdown tables"
          - value: "short_paragraphs"
            label: "Keep paragraphs short"
          - value: "headers_ok"
            label: "Headers for organization are good"
      - key: "pet_peeves"
        type: "text"
        multiline: true
        description: "Things I should avoid in communication"

# Templates define how answers map to markdown content
templates:
  output_file_map:
    SOUL.md:
      - soul-communication
      - soul-tone
    IDENTITY.md:
      - identity-base
    HEARTBEAT.md:
      - heartbeat-proactivity
  soul-communication:
    section: "## Communication Style\n\n"
    content: |
      **Directness:** {directness}
      
      {directness_description}
    mappings:
      directness: "communication.directness"
      directness_description: "communication.directness.description"

  soul-tone:
    section: "## Tone / Voice\n\n"
    content: |
      **Tone:** {tone}
      
      {tone_description}
    mappings:
      tone: "tone.tone"
      tone_description: "tone.tone.description"

  identity-base:
    section: "# IDENTITY.md - Who Am I?\n\n"
    content: |
      *Assigned by ∅ on {date}*

      - **Name:** {name}
      - **Creature:** {creature}
      - **Vibe:** {vibe}
      - **Emoji:** {emoji}
      - **Avatar:** *(TBD)*

      **Notes:**  
      {notes}

      ---

      *This file represents the start of figuring out who I am — as defined by those who use me.*

      Notes:
      - Save this file at the workspace root as `IDENTITY.md`.
      - For avatars, use a workspace-relative path like `avatars/openclaw.png`.
    mappings:
      name: "identity.name"
      creature: "identity.creature"
      vibe: "identity.vibe"
      emoji: "identity.emoji"
      notes: "identity.notes"
      date: "system.date"

  heartbeat-proactivity:
    section: "# HEARTBEAT.md — Periodic Check-In\n\n"
    content: |
      > Read this file and follow instructions. Check during active hours only.

      ## Proactivity Rules

      **Check-in Frequency:** {check_in_frequency}
      
      {check_in_frequency_description}

      **Suggestions:** {suggestions}
      
      {suggestions_description}

      **Proactive Triggers:**
      {triggers}

      ---

      *This file controls agent behavior during heartbeat runs.*
    mappings:
      check_in_frequency: "proactivity.check_in_frequency"
      check_in_frequency_description: "proactivity.check_in_frequency.description"
      suggestions: "proactivity.suggestions"
      suggestions_description: "proactivity.suggestions.description"
      triggers: "proactivity.triggers"
